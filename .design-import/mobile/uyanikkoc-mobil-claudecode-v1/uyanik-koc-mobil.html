<style>
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Plus Jakarta Sans", -apple-system, sans-serif;
    background:
      radial-gradient(1100px 700px at 80% -10%, #ECEBF8, transparent 60%),
      radial-gradient(900px 600px at 0% 110%, #EAEFFA, transparent 55%),
      #E9EAF2;
    display: flex; align-items: center; justify-content: center;
    min-height: 100%;
    overflow: hidden;
  }
  #stage { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
  .caption { text-align: center; max-width: 420px; }
  .caption .pill {
    display: inline-flex; align-items: center; gap: 8px; height: 34px; padding: 0 15px;
    border-radius: 999px; background: rgba(255,255,255,.7); border: 1px solid rgba(83,74,183,.16);
    box-shadow: 0 4px 14px rgba(24,26,40,.06); backdrop-filter: blur(8px);
    font-size: 12.5px; font-weight: 800; color: #463DA6; letter-spacing: -.01em;
  }
  .caption .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #534AB7; }
  .hint { margin-top: 12px; font-size: 12px; font-weight: 600; color: #767A90; }
</style>

<div id="stage"><div id="app"></div></div>
