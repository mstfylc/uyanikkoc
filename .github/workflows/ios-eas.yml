name: iOS (EAS Build)

# EAS Build, iOS .ipa'yı Expo'nun bulut macOS altyapısında derler — bu yüzden
# runner ubuntu yeterli. TestFlight'a göndermek için `submit` girdisini açın.
# Gerekli secret'lar (Settings → Secrets → Actions):
#   EXPO_TOKEN                          (zorunlu — https://expo.dev/accounts/[hesap]/settings/access-tokens)
#   EXPO_APPLE_APP_SPECIFIC_PASSWORD    (submit için — appleid.apple.com app-specific password)
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profili"
        type: choice
        options: [production, preview]
        default: production
      submit:
        description: "Build sonrası TestFlight'a gönder"
        type: boolean
        default: false

concurrency:
  group: ios-eas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS iOS build
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify EAS project link
        working-directory: apps/mobile
        run: |
          node -e "const c=require('./app.json'); if(!c.expo.extra?.eas?.projectId){console.error('\n[HATA] app.json extra.eas.projectId yok. Bir kez \`cd apps/mobile && eas init\` çalıştırıp sonucu commit edin.\n'); process.exit(1)}"

      - name: EAS build (iOS)
        working-directory: apps/mobile
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --wait

      - name: EAS submit to TestFlight
        if: ${{ inputs.submit }}
        working-directory: apps/mobile
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
        run: eas submit --platform ios --profile production --latest --non-interactive
